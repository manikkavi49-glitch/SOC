<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMC - Register Organizer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <h2>KMC <span>Register</span></h2>
        <p style="color: var(--text-sec); margin-bottom: 30px;">Create an organizer account</p>

        <form id="registerForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="e.g. John Doe" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="e.g. name@mail.com" required>
            </div>

            <div class="input-group">
                <label>Create Password</label>
                <input type="password" id="regPass" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" style="margin-top: 20px;">
                Sign Up as Organizer
            </button>
        </form>

        <p style="font-size: 14px; margin-top: 25px; color: var(--text-sec);">
            Already a member? <a href="login.html" style="color: var(--accent); text-decoration: none; font-weight: bold;">Login here</a>
        </p>
    </div>

    <script src="auth.js"></script>
</body>
</html>
