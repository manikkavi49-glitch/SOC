<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KMC - Organizer Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h2>KMC <span>Login</span></h2>
            <p>Welcome back, Organizer</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="e.g. name@mail.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPass" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Login to Dashboard</button>
        </form>

        <div class="auth-footer">
            <p>New Organizer? <a href="register.html">Create Account</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
